<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SPAEI DIGITAL v3.0 — COE/PMERJ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --az:#1B3A6B;--azm:#2A5BA8;--azcl:#EEF4FF;
  --ou:#D4A017;--oucl:#FFFBEA;
  --vd:#166534;--vdcl:#DCFCE7;
  --vm:#DC2626;--vmcl:#FEE2E2;
  --am:#B45309;--amcl:#FEF3C7;
  --bg:#F1F5FB;--card:#FFFFFF;--border:#E2EAF6;
  --text:#0F172A;--muted:#64748B;--hover:#EEF4FF;
  --inp:#F8FAFF;--inpb:#CBD5E1;
  --thead:#EEF4FF;--tr1:#FAFCFF;--tr2:#F3F8FF;
  --sb:#1B3A6B;--sbtext:#FFF;--sbmuted:#8AACCC;
}
.dark{
  --bg:#060E1F;--card:#0D1E38;--border:#1A3358;
  --text:#E2EAF6;--muted:#6882A4;--hover:#112040;
  --inp:#060E1F;--inpb:#1A3358;
  --thead:#091730;--tr1:#0C1D38;--tr2:#0E2040;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px}

/* ── LOGIN ── */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:linear-gradient(135deg,#040B18 0%,#0D1E35 45%,#1B3A6B 100%);
  position:relative;overflow:hidden}
#login::before{content:'';position:absolute;top:-100px;right:-100px;width:500px;height:500px;
  border-radius:50%;background:rgba(27,58,107,.3);pointer-events:none}
#login::after{content:'';position:absolute;bottom:-80px;left:-80px;width:350px;height:350px;
  border-radius:50%;background:rgba(212,160,23,.08);pointer-events:none}
.login-card{background:rgba(13,30,53,.92);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:40px;width:100%;max-width:400px;
  box-shadow:0 30px 80px rgba(0,0,0,.6);position:relative;z-index:1}
.login-logo{text-align:center;margin-bottom:28px}
.login-shield{width:72px;height:72px;background:rgba(212,160,23,.15);border:2px solid rgba(212,160,23,.5);
  border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:32px}
.login-title{color:#FFF;font-size:22px;font-weight:800;letter-spacing:2px}
.login-sub{color:#B8860B;font-size:10px;letter-spacing:2.5px;margin-top:4px;font-weight:700}
.login-ver{color:#4A6080;font-size:9px;margin-top:2px}
.lbl{color:#8AACCC;font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:6px;display:block}
.linp{width:100%;padding:12px 14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:10px;color:#FFF;font-size:15px;outline:none;transition:border .2s}
.linp:focus{border-color:#D4A017}
.linp::placeholder{color:rgba(255,255,255,.25)}
.lerr{background:rgba(220,38,38,.2);border:1px solid rgba(220,38,38,.4);border-radius:8px;
  padding:10px 12px;color:#FCA5A5;font-size:12px;display:none;align-items:center;gap:8px;margin-top:4px}
.lbtn{width:100%;padding:13px;background:linear-gradient(135deg,#7C5200,#D4A017);color:#FFF;
  border:none;border-radius:10px;font-size:14px;font-weight:700;letter-spacing:1px;
  display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;
  transition:all .2s}
.lbtn:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(212,160,23,.4)}
.lbtn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.lhint{text-align:center;color:#2A3D52;font-size:9px;margin-top:18px}
.lhint span{color:#3A5070}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}

/* ── LAYOUT PRINCIPAL ── */
#app{display:flex;height:100vh;display:none}
#sidebar{width:255px;background:linear-gradient(180deg,#0F2045,#1B3A6B);
  display:flex;flex-direction:column;flex-shrink:0;transition:left .3s;
  overflow:hidden}
.sb-head{padding:18px 14px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo{display:flex;align-items:center;gap:10px}
.sb-icon{width:36px;height:36px;background:rgba(212,160,23,.2);border:1px solid rgba(212,160,23,.45);
  border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-name{color:#FFF;font-size:14px;font-weight:800;letter-spacing:1px}
.sb-unit{color:#B8860B;font-size:8px;letter-spacing:2px;font-weight:700}
.sb-user{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(0,0,0,.18)}
.sb-avatar{width:32px;height:32px;background:rgba(212,160,23,.3);border-radius:50%;
  display:flex;align-items:center;justify-content:center;border:2px solid rgba(212,160,23,.5);
  color:#D4A017;font-weight:800;font-size:13px;flex-shrink:0}
.sb-posto{color:#FFF;font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-nome{color:#8AACCC;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-admin-tag{color:#D4A017;font-size:8px;font-weight:700;letter-spacing:.5px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;
  background:transparent;border:1px solid transparent;border-radius:9px;
  cursor:pointer;text-align:left;margin-bottom:2px;transition:all .15s;color:#A8BECF;font-size:13px}
.nav-btn:hover{background:rgba(255,255,255,.05);color:#D4A017}
.nav-btn.active{background:rgba(212,160,23,.2);border-color:rgba(212,160,23,.3);color:#D4A017;font-weight:700}
.nav-icon{font-size:17px;width:20px;text-align:center}
.nav-badge{background:#DC2626;color:#FFF;border-radius:10px;padding:1px 6px;font-size:9px;font-weight:700;margin-left:auto}
.sb-foot{padding:10px 8px;border-top:1px solid rgba(255,255,255,.07)}
.logout-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;
  background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);border-radius:9px;
  cursor:pointer;color:#F87171;font-size:13px;font-weight:600}
.logout-btn:hover{background:rgba(220,38,38,.2)}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{background:var(--card);border-bottom:1px solid var(--border);
  padding:0 18px;height:56px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.tb-menu{background:none;border:none;color:var(--muted);display:flex;padding:4px}
.tb-title{font-size:15px;font-weight:700;color:var(--text)}
.tb-date{font-size:10px;color:var(--muted)}
.tb-spacer{flex:1}
.tb-btn{background:var(--hover);border:1px solid var(--border);border-radius:8px;
  padding:6px 8px;color:var(--muted);display:flex;align-items:center;gap:4px;
  font-size:12px;position:relative}
.tb-btn:hover{border-color:var(--az);color:var(--az)}
.notif-dot{position:absolute;top:-4px;right:-4px;background:#DC2626;color:#FFF;
  border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center}

#content{flex:1;overflow-y:auto;padding:18px}
.screen{display:none}
.screen.active{display:block}

/* ── CARDS E ESTATÍSTICAS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:13px;
  padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:13px;
  padding:15px 17px;display:flex;align-items:center;gap:13px;
  box-shadow:0 2px 8px rgba(0,0,0,.05)}
.stat-ico{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;
  justify-content:center;font-size:20px;flex-shrink:0}
.stat-val{font-size:26px;font-weight:800;line-height:1}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.stat-sub{font-size:9px;opacity:.7;margin-top:1px}

/* ── BOAS VINDAS ── */
.bv{background:linear-gradient(135deg,#1B3A6B,#2A5BA8);border-radius:13px;
  padding:15px 18px;color:#FFF;margin-bottom:14px;border:1px solid rgba(255,255,255,.1)}
.bv-title{font-size:16px;font-weight:700}
.bv-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:3px}

/* ── SEÇÃO HEADER ── */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;flex-wrap:wrap;gap:8px}
.sec-title{font-size:18px;font-weight:800;color:var(--text)}
.sec-sub{font-size:11px;color:var(--muted)}

/* ── BOTÕES ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:9px;
  border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--az);color:#FFF}
.btn-primary:hover{background:var(--azm)}
.btn-ghost{background:var(--hover);border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--az);color:var(--az)}
.btn-danger{background:var(--vmcl);color:var(--vm);border:1px solid rgba(220,38,38,.3)}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:7px}
.btn-gold{background:linear-gradient(135deg,#7C5200,#D4A017);color:#FFF}

/* ── PILLS / BADGES ── */
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
.pill-serv{background:#DCFCE7;color:#166534}
.pill-folg{background:#DBEAFE;color:#1E40AF}
.pill-disp{background:#FEF3C7;color:#92400E}
.pill-fer{background:#F3E8FF;color:#6B21A8}
.pill-lic{background:#FEE2E2;color:#991B1B}
.pill-and{background:#DBEAFE;color:#1E40AF}
.pill-fase{background:#FEF3C7;color:#92400E}
.pill-conc{background:#DCFCE7;color:#166534}
.pill-ag{background:#F3E8FF;color:#6B21A8}
.pill-alta{background:#FEE2E2;color:#991B1B}
.pill-media{background:#FEF3C7;color:#92400E}
.pill-baixa{background:#DCFCE7;color:#166534}
.pill-urg{background:#DC2626;color:#FFF}
.pill-norm{background:#EFF6FF;color:#1E3A8A}

/* ── TABELA ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:600px}
th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);
  background:var(--thead);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text)}
tr:nth-child(even) td{background:var(--tr2)}
tr:hover td{background:var(--hover)}
.cell-mono{font-family:monospace;font-size:10px;letter-spacing:.5px}

/* ── FILTROS ── */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--card);
  border:1px solid var(--border);border-radius:10px;padding:7px 12px;flex:1;min-width:160px}
.search-box input{border:none;background:none;outline:none;color:var(--text);font-size:13px;width:100%}
.filter-btn{padding:6px 12px;border-radius:8px;border:1px solid var(--border);
  background:var(--card);color:var(--muted);font-size:10px;font-weight:700;white-space:nowrap;cursor:pointer}
.filter-btn.on{background:var(--az);color:#FFF;border-color:var(--az)}

/* ── PROCESSO CARD ── */
.proc-card{background:var(--card);border:1px solid var(--border);border-radius:12px;
  margin-bottom:10px;overflow:hidden;display:flex}
.proc-bar{width:4px;flex-shrink:0}
.proc-body{flex:1;padding:13px 15px}
.proc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.proc-num{font-size:10px;color:var(--muted);font-family:monospace;margin-bottom:3px}
.proc-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:5px}
.proc-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--muted)}
.proc-acts{display:flex;flex-direction:column;justify-content:center;gap:4px;padding:8px;flex-shrink:0}

/* ── AVISO CARD ── */
.av-card{border:1px solid;border-radius:12px;padding:14px;margin-bottom:10px}
.av-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.av-title{font-size:13px;font-weight:700;color:var(--text);flex:1}
.av-tags{display:flex;gap:6px;align-items:center}
.av-texto{font-size:12px;color:var(--muted);line-height:1.55}
.av-meta{font-size:10px;color:var(--muted);margin-top:7px}

/* ── ESCALA TABELA ── */
.cel-status{display:inline-block;padding:3px 5px;border-radius:6px;font-size:10px;font-weight:700;
  white-space:nowrap;cursor:pointer;transition:all .1s}
.cel-status:hover{opacity:.8;transform:scale(1.05)}
.mini-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:12px}
.mini-day{border:1px solid var(--border);border-radius:9px;padding:7px 3px;text-align:center;background:var(--card)}
.mini-day.hoje{background:var(--az);border-color:#D4A017;border-width:2px}
.mini-day-lbl{font-size:9px;font-weight:700}
.mini-day.hoje .mini-day-lbl{color:#D4A017}
.mini-day:not(.hoje) .mini-day-lbl{color:var(--muted)}
.mini-day-dt{font-size:9px;margin-bottom:3px}
.mini-day.hoje .mini-day-dt{color:#93C5FD}
.mini-day:not(.hoje) .mini-day-dt{color:var(--muted)}
.mini-cnt{font-size:9px;font-weight:700}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;
  align-items:center;justify-content:center;padding:18px}
.overlay.open{display:flex}
.modal{background:var(--card);border-radius:16px;padding:22px;width:100%;max-width:480px;
  box-shadow:0 25px 50px rgba(0,0,0,.35);max-height:90vh;overflow-y:auto}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:700;color:var(--text)}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.modal-close:hover{background:var(--hover)}
.form-group{margin-bottom:12px}
.form-lbl{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px;letter-spacing:.5px;display:block}
.form-inp{width:100%;padding:9px 11px;border:1px solid var(--inpb);border-radius:8px;
  background:var(--inp);color:var(--text);font-size:13px;outline:none}
.form-inp:focus{border-color:var(--az)}
.form-sel{width:100%;padding:9px 11px;border:1px solid var(--inpb);border-radius:8px;
  background:var(--inp);color:var(--text);font-size:13px;outline:none}
.form-ta{width:100%;padding:9px 11px;border:1px solid var(--inpb);border-radius:8px;
  background:var(--inp);color:var(--text);font-size:13px;outline:none;resize:vertical;font-family:inherit}
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn-row .btn{flex:1;justify-content:center}

/* ── ADMIN TABS ── */
.tabs{display:flex;gap:3px;background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:3px;margin-bottom:14px}
.tab-btn{flex:1;padding:7px;border-radius:8px;border:none;background:transparent;
  color:var(--muted);font-size:11px;font-weight:700;cursor:pointer}
.tab-btn.on{background:var(--az);color:#FFF}

/* ── RELATÓRIOS ── */
.rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.rel-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px}
.rel-ico{font-size:28px;margin-bottom:8px}
.rel-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.rel-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:12px}
.rel-btns{display:flex;gap:6px;flex-wrap:wrap}

/* ── GRAFICO BARRA SIMPLES ── */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.bar-lbl{font-size:11px;color:var(--muted);width:140px;flex-shrink:0}
.bar-bg{flex:1;background:var(--hover);border-radius:4px;height:18px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px}
.bar-val{font-size:9px;color:#FFF;font-weight:700}

/* ── TOKEN CARD ── */
.tok-card{background:var(--card);border:1px solid var(--border);border-radius:11px;
  padding:12px 15px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.tok-rg{font-size:11px;color:var(--muted)}
.tok-val{font-size:18px;font-family:monospace;font-weight:800;color:var(--az);letter-spacing:3px}
.tok-dt{font-size:9px;color:var(--muted)}

/* ── LOG ── */
.log-row{display:flex;gap:10px;padding:7px 9px;background:var(--hover);border-radius:7px;
  font-size:11px;margin-bottom:4px}
.log-dt{color:var(--muted);font-family:monospace;flex-shrink:0;font-size:10px}
.log-tipo{font-weight:700;flex-shrink:0}
.log-desc{color:var(--text)}

/* ── CONFIG TABLE ── */
.cfg-row{display:flex;justify-content:space-between;align-items:center;padding:9px 11px;
  background:var(--hover);border-radius:8px;margin-bottom:5px;gap:10px}
.cfg-k{font-size:12px;font-weight:600;color:var(--text)}
.cfg-v{font-size:11px;color:var(--muted);font-family:monospace;text-align:right}

/* ── CARDS VIEW ESCALA ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:12px}
.esc-card{background:var(--card);border:1px solid var(--border);border-radius:13px;
  padding:14px;border-left:4px solid}
.esc-posto{font-size:10px;color:var(--muted);font-weight:700}
.esc-nome{font-size:13px;font-weight:700;color:var(--text)}
.esc-ad{font-size:9px;color:#D97706;font-weight:700}
.esc-week{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:10px}
.esc-day{text-align:center;padding:3px 1px;border-radius:5px}
.esc-day.hoje-d{border:2px solid}
.esc-day-lbl{font-size:7px;font-weight:700}
.esc-day-s{font-size:7px}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:40px;color:var(--muted)}
.empty-ico{font-size:36px;margin-bottom:10px;opacity:.4;display:block}

/* ── MOBILE ── */
@media(max-width:768px){
  #sidebar{position:fixed;top:0;bottom:0;left:-260px;z-index:200}
  #sidebar.open{left:0;box-shadow:6px 0 24px rgba(0,0,0,.5)}
  .sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}
  .sb-overlay.open{display:block}
  #content{padding:12px}
}
</style>
</head>
<body>

<!-- ─── TELA DE LOGIN ─── -->
<div id="login">

// ════════════════════════════════════════════
// SHA-256 (Web Crypto API nativa)
// ════════════════════════════════════════════
async function sha256(txt){
  const enc=new TextEncoder();
  const buf=await crypto.subtle.digest('SHA-256',enc.encode(txt));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function uid(){return crypto.randomUUID().replace(/-/g,'')}
function randTok(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:8},()=>c[Math.floor(Math.random()*c.length)]).join('');
}

// AUTENTICAÇÃO
// ════════════════════════════════════════════
const Auth={
  user:null,
  SESSION_KEY:'SPAEI3_SESSION',

  async login(){
    const rg=document.getElementById('l-rg').value.trim();
    const tok=document.getElementById('l-tok').value.trim();
    const btn=document.getElementById('l-btn');
    const err=document.getElementById('l-err');
    err.style.display='none';
    if(!rg||!tok){this.showErr('Preencha RG e Token.');return;}
    btn.disabled=true;
    btn.innerHTML='<span class="spin">⟳</span> AUTENTICANDO...';

    const efetivo=DB.get('efetivo')||[];
    const militar=efetivo.find(e=>e.rg===rg);
    if(!militar){
      await new Promise(r=>setTimeout(r,800));
      this.showErr('RG não encontrado. Contate o administrador.');
      btn.disabled=false;btn.innerHTML='🔒 ACESSAR SISTEMA';return;
    }

    // Verificar token
    const tokens=DB.get('tokens')||{};
    const td=tokens[rg];
    let valido=false;

    if(td){
      if(td.salt==='bootstrap'){
        // Tokens de bootstrap aceitam "COE2026" ou rg como token
        valido=(tok==='COE2026'||tok===rg);
      } else {
        const h=await sha256(td.salt+tok);
        valido=(h===td.hash&&td.ativo);
      }
    }

    await new Promise(r=>setTimeout(r,700));

    if(!valido){
      this.showErr('Token inválido ou expirado. Contate o administrador.');
      btn.disabled=false;btn.innerHTML='🔒 ACESSAR SISTEMA';return;
    }

    this.user={...militar};
    sessionStorage.setItem(this.SESSION_KEY,JSON.stringify(this.user));

    // Log
    const logs=DB.get('logs')||[];
    logs.unshift({dt:new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}),
      tipo:'LOGIN',desc:`${militar.posto} ${militar.nome} acessou (RG ${rg})`});
    DB.set('logs',logs.slice(0,200));

    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='flex';
    App.init();
    btn.disabled=false;btn.innerHTML='🔒 ACESSAR SISTEMA';
  },

  showErr(msg){
    const e=document.getElementById('l-err');
    document.getElementById('l-errmsg').textContent=msg;
    e.style.display='flex';
  },

  logout(){
    if(!confirm('Deseja sair do SPAEI DIGITAL?'))return;
    sessionStorage.removeItem(this.SESSION_KEY);
    this.user=null;
    document.getElementById('app').style.display='none';
    document.getElementById('login').style.display='flex';
    document.getElementById('l-rg').value='';
    document.getElementById('l-tok').value='';
  },

  restore(){
    const raw=sessionStorage.getItem(this.SESSION_KEY);
    if(raw){this.user=JSON.parse(raw);return true;}
    return false;
  }
};

              <div>
                <div class="esc-posto">${m.posto}</div>
                <div class="esc-nome">${m.nome}</div>
                ${m.adido?'<div class="esc-ad">● ADIDO</div>':''}

                  <div class="esc-day-lbl" style="color:${cc.cor||'var(--muted)'}">${d.lbl}</div>

  _editCell(rg,di,stAtual){
    const html=`
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px">
        ${(DB.get('efetivo')||[]).find(e=>e.rg===rg)?.nome} · ${DIAS[di]?.dt}</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${Object.keys(ST_CFG).map(s=>`
        <button onclick="Render._saveCell('${rg}',${di},'${s}')" style="
          padding:10px 14px;border-radius:9px;cursor:pointer;text-align:left;font-weight:700;font-size:13px;
          background:${ST_CFG[s].bg};color:${ST_CFG[s].cor};
          border:${stAtual===s?`2px solid ${ST_CFG[s].borda}`:'1px solid var(--border)'}">${s}</button>`).join('')}
      </div>`;
    Modal.open('Editar Status',html);
  },

  _saveCell(rg,di,novoSt){
    const esc=DB.get('escala')||{};
    if(!esc[rg])esc[rg]=Array(7).fill('FOLGA');
    esc[rg]=[...esc[rg]];
    esc[rg][di]=novoSt;
    DB.set('escala',esc);
    const logs=DB.get('logs')||[];
    logs.unshift({dt:new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}),
      tipo:'EDIÇÃO',desc:`Escala RG ${rg} em ${DIAS[di].dt}: ${novoSt}`});
    DB.set('logs',logs.slice(0,200));
    Modal.close();Render.folgas();
  },

  // ── PROCESSOS SEI ──────────────────────────
  processos(){
    const proc=DB.get('processos')||[];
    const user=Auth.user;
    const busca=(DB.get('p_busca')||'').toLowerCase();
    const filtro=DB.get('p_filtro')||'TODOS';
    const filtered=proc.filter(p=>{
      const ok1=filtro==='TODOS'||p.status===filtro;
      const ok2=!busca||p.assunto.toLowerCase().includes(busca)||p.numero.includes(busca)||p.resp.toLowerCase().includes(busca);
      return ok1&&ok2;
    });

    document.getElementById('s-processos').innerHTML=`
      <div class="sec-head">
        <div>
          <div class="sec-title">Processos SEI</div>
          <div class="sec-sub">${proc.length} processo(s) · ${proc.filter(p=>p.status!=='CONCLUÍDO').length} pendente(s)</div>
        </div>
        ${user.admin?`<button class="btn btn-primary" onclick="Render._novoProc()">➕ Novo Processo</button>`:''}
      </div>
      <div class="filters">
        <div class="search-box">
          🔍<input value="${busca}" placeholder="Buscar por assunto ou número SEI..."
            oninput="DB.set('p_busca',this.value);Render.processos()">
        </div>
        ${['TODOS','EM ANDAMENTO','FASE PREPARATÓRIA','AGUARDANDO','CONCLUÍDO'].map(s=>
          `<button class="filter-btn${filtro===s?' on':''}" onclick="DB.set('p_filtro','${s}');Render.processos()">${s}</button>`
        ).join('')}
      </div>
      ${filtered.length===0?`<div class="empty"><span class="empty-ico">📋</span>Nenhum processo encontrado.</div>`:
      filtered.map(p=>{const c=PR_CFG[p.status]||{};const pi=PI_CFG[p.prio]||{};return`
        <div class="proc-card">
          <div class="proc-bar" style="background:${c.cor||'#888'}"></div>
          <div class="proc-body">
            <div class="proc-tags">
              <span class="pill ${c.cls||''}">${p.status}</span>
              <span class="pill ${pi.cls||''}">${p.prio}</span>
              <span class="pill" style="background:var(--hover);color:var(--muted)">${p.tipo}</span>
            </div>
            <div class="proc-num">${p.numero}</div>
            <div class="proc-title">${p.assunto}</div>
            <div class="proc-meta">
              <span>👤 ${p.resp}</span>
              <span>📅 Criado: ${p.criado}</span>
              <span>⏰ Prazo: ${p.prazo}</span>
            </div>
          </div>
          ${user.admin?`<div class="proc-acts">
            <button class="btn btn-ghost btn-sm" onclick="Render._editProc('${p.id}')" style="padding:5px 7px">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="Render._delProc('${p.id}')" style="padding:5px 7px">🗑️</button>
          </div>`:''}
        </div>`}).join('')}`;
  },

  _novoProc(){
    const user=Auth.user;
    Modal.open('Novo Processo SEI',this._formProc({resp:`${user.posto} ${user.nome.split(' ')[0]}`},'_salvarProc(null)'));
  },
  _editProc(id){
    const p=(DB.get('processos')||[]).find(x=>x.id===id);
    if(!p)return;
    Modal.open('Editar Processo',this._formProc(p,`_salvarProc('${id}')`));
  },
  _formProc(p,cb){return`
    <div class="form-group"><label class="form-lbl">NÚMERO SEI</label>
      <input class="form-inp" id="fp-num" value="${p.numero||''}" placeholder="SEI-260001/000000/2026"></div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <div class="form-group"><label class="form-lbl">TIPO</label>
        <select class="form-sel" id="fp-tipo">
          ${['AQUISIÇÃO','LICITAÇÃO','OBRA/SERVIÇO','ADMINISTRATIVO'].map(o=>`<option${p.tipo===o?' selected':''}>${o}</option>`).join('')}
        </select></div>

        </select></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
      <button class="btn btn-primary" onclick="Render.${cb}">Salvar</button>
    </div>`;},
  _salvarProc(id){
    const novo={
      id:id||('P'+Date.now()),
      numero:document.getElementById('fp-num').value.trim(),
      assunto:document.getElementById('fp-ass').value.trim(),
      resp:document.getElementById('fp-resp').value.trim(),
      prazo:document.getElementById('fp-prazo').value.trim(),
      tipo:document.getElementById('fp-tipo').value,
      status:document.getElementById('fp-st').value,
      prio:document.getElementById('fp-prio').value,
      criado:id?((DB.get('processos')||[]).find(x=>x.id===id)?.criado||''):new Date().toLocaleDateString('pt-BR'),
      obs:'',
    };
    if(!novo.numero||!novo.assunto){alert('Preencha Número e Assunto.');return;}
    const proc=DB.get('processos')||[];
    if(id)DB.set('processos',proc.map(p=>p.id===id?novo:p));
    else DB.set('processos',[...proc,novo]);
    Modal.close();Render.processos();
  },
  _delProc(id){
    if(!confirm('Excluir este processo?'))return;
    DB.set('processos',(DB.get('processos')||[]).filter(p=>p.id!==id));
    Render.processos();
  },

  // ── AVISOS ─────────────────────────────────
  avisos(){
    const todosAv=DB.get('avisos')||[];
    const user=Auth.user;
    const ef=DB.get('efetivo')||[];
    const avFiltro=DB.get('av_filtro')||'TODOS';

    // helpers
    function avEhColetivo(a){ return !a.dest||a.dest==='TODOS'; }
    function avVisivelPara(a,rg){
      if(avEhColetivo(a)) return true;
      if(Array.isArray(a.dest)) return a.dest.includes(rg);
      return a.dest===rg;
    }
    function destLabel(a){
      if(avEhColetivo(a)) return 'Todo o Efetivo';
      const rgs=Array.isArray(a.dest)?a.dest:[a.dest];
      return rgs.map(r=>{const m=ef.find(e=>e.rg===r);return m?m.nome.split(' ')[0]:r;}).join(', ');
    }
    function destFullLabel(a){
      if(avEhColetivo(a)) return '';
      const rgs=Array.isArray(a.dest)?a.dest:[a.dest];
      return rgs.map(r=>{const m=ef.find(e=>e.rg===r);return m?`${m.posto} ${m.nome}`:r;}).join(' · ');
    }

    // Quais avisos este usuário pode ver
    const avVisiveis=user.admin
      ? todosAv
      : todosAv.filter(a=>avVisivelPara(a,user.rg));

    // Aplicar filtro de aba (só para admin)
    const av=user.admin ? avVisiveis.filter(a=>{
      if(avFiltro==='COLETIVOS') return avEhColetivo(a);
      if(avFiltro==='INDIVIDUAIS') return !avEhColetivo(a);
      return true;
    }) : avVisiveis;

    const nlTotal=avVisiveis.filter(a=>!a.lido).length;
    const nColet=todosAv.filter(a=>avEhColetivo(a)).length;
    const nIndiv=todosAv.filter(a=>!avEhColetivo(a)).length;

    document.getElementById('s-avisos').innerHTML=`
      <div class="sec-head">
        <div>
          <div class="sec-title">Avisos Institucionais</div>
          <div class="sec-sub">${nlTotal} não lido(s) · ${avVisiveis.length} aviso(s)</div>
        </div>
        ${user.admin?`<button class="btn btn-primary" onclick="Render._novoAviso()">➕ Novo Aviso</button>`:''}
      </div>

      ${user.admin?`
      <!-- Abas de filtro (só admin vê) -->
      <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
        <button onclick="DB.set('av_filtro','TODOS');Render.avisos()"
          style="display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:10px;
          border:1px solid ${avFiltro==='TODOS'?'var(--az)':'var(--border)'};
          background:${avFiltro==='TODOS'?'var(--az)':'var(--card)'};
          color:${avFiltro==='TODOS'?'#FFF':'var(--muted)'};font-size:13px;font-weight:700;cursor:pointer">
          📋 Todos
          <span style="background:${avFiltro==='TODOS'?'rgba(255,255,255,.25)':'var(--hover)'};
            color:${avFiltro==='TODOS'?'#FFF':'var(--muted)'};border-radius:20px;
            padding:1px 8px;font-size:11px">${todosAv.length}</span>
        </button>
        <button onclick="DB.set('av_filtro','COLETIVOS');Render.avisos()"
          style="display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:10px;
          border:1px solid ${avFiltro==='COLETIVOS'?'#166534':'var(--border)'};
          background:${avFiltro==='COLETIVOS'?'#166534':'var(--card)'};
          color:${avFiltro==='COLETIVOS'?'#FFF':'var(--muted)'};font-size:13px;font-weight:700;cursor:pointer">
          📢 Coletivos
          <span style="background:${avFiltro==='COLETIVOS'?'rgba(255,255,255,.25)':'var(--hover)'};
            color:${avFiltro==='COLETIVOS'?'#FFF':'var(--muted)'};border-radius:20px;
            padding:1px 8px;font-size:11px">${nColet}</span>
        </button>
        <button onclick="DB.set('av_filtro','INDIVIDUAIS');Render.avisos()"
          style="display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:10px;
          border:1px solid ${avFiltro==='INDIVIDUAIS'?'#1E40AF':'var(--border)'};
          background:${avFiltro==='INDIVIDUAIS'?'#1E40AF':'var(--card)'};
          color:${avFiltro==='INDIVIDUAIS'?'#FFF':'var(--muted)'};font-size:13px;font-weight:700;cursor:pointer">
          📩 Individuais
          <span style="background:${avFiltro==='INDIVIDUAIS'?'rgba(255,255,255,.25)':'var(--hover)'};
            color:${avFiltro==='INDIVIDUAIS'?'#FFF':'var(--muted)'};border-radius:20px;
            padding:1px 8px;font-size:11px">${nIndiv}</span>
        </button>
      </div>`:''}

      <!-- Lista de avisos -->
      ${av.length===0
        ?`<div class="empty"><span class="empty-ico">🔔</span>Nenhum aviso nesta categoria.</div>`
        :av.map(a=>{
          const c=AV_CFG[a.prio]||AV_CFG.NORMAL;
          const isIndiv=!avEhColetivo(a);
          const dl=destLabel(a);
          const dfl=destFullLabel(a);
          return`
          <div class="av-card" style="
            border-color:${c.borda}44;
            border-left:4px solid ${isIndiv?'#1E40AF':c.borda};
            background:${c.bg};
            opacity:${a.lido?.78:1}">
            <div class="av-head">
              <div style="flex:1;min-width:0">
                <!-- Selo coletivo ou individual -->
                ${isIndiv
                  ?`<div style="display:inline-flex;align-items:center;gap:5px;
                      background:rgba(30,64,175,.1);border:1px solid rgba(30,64,175,.3);
                      border-radius:20px;padding:3px 10px;margin-bottom:7px">
                      <span>📩</span>
                      <span style="font-size:10px;font-weight:700;color:#1E40AF">PARA: ${dfl}</span>
                    </div>`
                  :`<div style="display:inline-flex;align-items:center;gap:5px;
                      background:rgba(22,101,52,.1);border:1px solid rgba(22,101,52,.3);
                      border-radius:20px;padding:3px 10px;margin-bottom:7px">
                      <span>📢</span>
                      <span style="font-size:10px;font-weight:700;color:#166534">COLETIVO · TODO O EFETIVO</span>
                    </div>`}
                <div class="av-title">${a.titulo}</div>
              </div>
              <div class="av-tags" style="flex-shrink:0;align-items:flex-start">
                <span class="pill ${c.cls||''}">${a.prio}</span>
                ${!a.lido?'<span class="pill pill-alta" style="font-size:8px">NOVO</span>':''}
                ${!a.lido?`<button class="btn btn-ghost btn-sm" onclick="Render._lerAviso('${a.id}')">✓ Lido</button>`:''}
                ${user.admin?`<button class="btn btn-danger btn-sm" onclick="Render._delAviso('${a.id}')">🗑️</button>`:''}
              </div>
            </div>
            <div class="av-texto">${a.texto}</div>
            <div class="av-meta" style="margin-top:8px;display:flex;gap:10px;flex-wrap:wrap">
              <span>✍️ ${a.autor}</span>
              <span>📅 ${a.data}</span>
              ${isIndiv?`<span style="color:#1E40AF;font-weight:700">📩 Visível apenas para: ${dl}</span>`:''}
            </div>
          </div>`
        }).join('')}`;
    buildNav();
  },
  _lerAviso(id){
    const av=DB.get('avisos')||[];
    DB.set('avisos',av.map(a=>a.id===id?{...a,lido:true}:a));
    Render.avisos();
  },
  _delAviso(id){
    if(!confirm('Excluir aviso?'))return;
    DB.set('avisos',(DB.get('avisos')||[]).filter(a=>a.id!==id));
    Render.avisos();
  },
  _novoAviso(){
    const ef=DB.get('efetivo')||[];
    const user=Auth.user;
    const outros=ef.filter(e=>e.rg!==user.rg);
    Modal.open('Novo Aviso Institucional',`
      <div class="form-group"><label class="form-lbl">TÍTULO</label>
        <input class="form-inp" id="av-tit" placeholder="Título do aviso"></div>
      <div class="form-group"><label class="form-lbl">MENSAGEM</label>
        <textarea class="form-ta" id="av-txt" rows="3" placeholder="Conteúdo do aviso..."></textarea></div>
      <div class="form-group"><label class="form-lbl">PRIORIDADE</label>
        <select class="form-sel" id="av-prio">
          ${['URGENTE','ALTA','NORMAL'].map(o=>`<option>${o}</option>`).join('')}
        </select></div>

      <div class="form-lbl" style="margin-bottom:8px">DESTINATÁRIOS — selecione um ou mais</div>

      <!-- Caixa de seleção de destinatários -->
      <div style="border:1px solid var(--inpb);border-radius:10px;overflow:hidden;margin-bottom:10px">

        <!-- Linha "Todo o Efetivo" -->
        <label style="display:flex;align-items:center;gap:10px;padding:10px 13px;
          cursor:pointer;background:var(--hover);border-bottom:1px solid var(--border);
          font-weight:700;font-size:13px;color:var(--text)" onclick="Render._toggleTodos(event)">
          <input type="checkbox" id="dest-todos" style="width:16px;height:16px;accent-color:var(--az)">
          <span style="font-size:15px">📢</span>

          <span style="margin-left:auto;font-size:10px;color:var(--muted);font-weight:400">${outros.length} militares</span>
        </label>

        <!-- Linha de cada militar -->
        <div id="dest-lista" style="max-height:200px;overflow-y:auto">
          ${outros.map((m,i)=>`
          <label style="display:flex;align-items:center;gap:10px;padding:9px 13px;cursor:pointer;
            border-bottom:${i<outros.length-1?'1px solid var(--border)':'none'};
            background:var(--card);font-size:13px;color:var(--text);transition:background .1s"
            onmouseover="this.style.background='var(--hover)'"
            onmouseout="this.style.background='var(--card)'"
            onclick="Render._onDestClick(event)">
            <input type="checkbox" class="dest-cb" value="${m.rg}"
              style="width:16px;height:16px;accent-color:var(--az);flex-shrink:0">

              <div style="font-weight:700;font-size:11px;color:var(--muted)">${m.posto}</div>
              <div style="font-weight:600">${m.nome}${m.adido?'<span style="color:#D97706;font-size:9px;margin-left:5px">(ADIDO)</span>':''}</div>

          </label>`).join('')}

      </div>

      <!-- Preview dos selecionados -->
      <div id="av-preview" style="display:none;padding:9px 12px;border-radius:9px;margin-bottom:10px;
        font-size:12px;font-weight:600;border:1px solid"></div>

      <div class="btn-row">
        <button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
        <button class="btn btn-primary" onclick="Render._pubAviso()">📤 Publicar</button>
      </div>`,520);

    // Marcar "todos" ao clicar nele
    document.getElementById('dest-todos').addEventListener('change',function(){
      document.querySelectorAll('.dest-cb').forEach(cb=>cb.checked=this.checked);
      Render._atualizarPreview();
    });
    document.querySelectorAll('.dest-cb').forEach(cb=>{
      cb.addEventListener('change',function(){

  _toggleTodos(e){
    // Evita duplo disparo quando clica no checkbox direto
    if(e.target.tagName==='INPUT') return;
    const cb=document.getElementById('dest-todos');
    cb.checked=!cb.checked;
    document.querySelectorAll('.dest-cb').forEach(c=>c.checked=cb.checked);

  },

  _onDestClick(e){
    if(e.target.tagName==='INPUT') return;
    const cb=e.currentTarget.querySelector('input');
    cb.checked=!cb.checked;
    const todos=[...document.querySelectorAll('.dest-cb')];
    document.getElementById('dest-todos').checked=todos.every(c=>c.checked);
    Render._atualizarPreview();
  },

  _atualizarPreview(){
    const todosCb=document.getElementById('dest-todos');
    const marcados=[...document.querySelectorAll('.dest-cb')].filter(c=>c.checked);
    const prev=document.getElementById('av-preview');
    if(marcados.length===0&&!todosCb.checked){
      prev.style.display='none'; return;
    }
    const ef=DB.get('efetivo')||[];
    prev.style.display='block';
    if(todosCb.checked&&marcados.length===document.querySelectorAll('.dest-cb').length){
      prev.style.background='rgba(22,101,52,.08)';
      prev.style.borderColor='rgba(22,101,52,.3)';
      prev.style.color='#166534';
      prev.innerHTML='📢 Aviso coletivo — todo o efetivo receberá esta mensagem';
    } else {
      const nomes=marcados.map(c=>{
        const m=ef.find(e=>e.rg===c.value);
        return m?m.nome.split(' ')[0]:'?';
      });
      prev.style.background='rgba(30,64,175,.08)';
      prev.style.borderColor='rgba(30,64,175,.3)';
      prev.style.color='#1E40AF';
      prev.innerHTML=`📩 Aviso individual para: <b>${nomes.join(', ')}</b>`;
    }
  },

  _pubAviso(){
    const tit=document.getElementById('av-tit').value.trim();
    const txt=document.getElementById('av-txt').value.trim();
    const prio=document.getElementById('av-prio').value;
    if(!tit||!txt){alert('Preencha título e mensagem.');return;}

    const todosCb=document.getElementById('dest-todos');
    const marcados=[...document.querySelectorAll('.dest-cb')].filter(c=>c.checked);
    const totalCbs=document.querySelectorAll('.dest-cb').length;

    // Ninguém selecionado
    if(!todosCb.checked&&marcados.length===0){
      alert('Selecione pelo menos um destinatário.');return;
    }

    const isTodos=(todosCb.checked&&marcados.length===totalCbs)||
                  (marcados.length===totalCbs);
    const dest=isTodos?'TODOS':marcados.map(c=>c.value);

    const u=Auth.user;
    const ef=DB.get('efetivo')||[];
    const av=DB.get('avisos')||[];
    const novoAv={
      id:'A'+Date.now(),titulo:tit,texto:txt,prio,dest,
      autor:`${u.posto} ${u.nome.split(' ')[0]}`,
      data:new Date().toLocaleDateString('pt-BR'),lido:false,
    };
    av.unshift(novoAv);
    DB.set('avisos',av);
    Modal.close();
    Render.avisos();

    // Toast de confirmação
    const nomes=isTodos?'todo o efetivo':
      marcados.map(c=>(ef.find(e=>e.rg===c.value)?.nome||c.value).split(' ')[0]).join(', ');
    const tip=document.createElement('div');
    tip.style.cssText='position:fixed;top:70px;right:18px;background:#166534;color:#FFF;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);max-width:320px';
    tip.textContent=`✅ Aviso enviado para: ${nomes}`;
    document.body.appendChild(tip);
    setTimeout(()=>tip.remove(),4000);
  },

  _gerarRel(tipo,fmt){
    if(fmt==='PDF'){
      alert('📄 PDF\n\nEm breve! No modo offline, o PDF é gerado via janela de impressão.\n\nPressione CTRL+P após fechar este aviso e selecione "Salvar como PDF".');
      return;
    }
    let csv='',nome='';
    if(tipo==='escala'){
      const ef=DB.get('efetivo')||[];const esc=DB.get('escala')||{};
      csv='POSTO,RG,NOME,'+DIAS.map(d=>d.dt).join(',')+'\n';
      ef.forEach(m=>{csv+=`${m.posto},${m.rg},"${m.nome}",${(esc[m.rg]||[]).join(',')}\n`;});
      nome='SPAEI_Escala.csv';
    } else if(tipo==='processos'){
      const proc=DB.get('processos')||[];
      csv='NUMERO,ASSUNTO,TIPO,STATUS,RESPONSAVEL,CRIADO,PRAZO,PRIORIDADE\n';
      proc.forEach(p=>{csv+=`"${p.numero}","${p.assunto}",${p.tipo},${p.status},"${p.resp}",${p.criado},${p.prazo},${p.prio}\n`;});
      nome='SPAEI_Processos.csv';
    } else if(tipo==='efetivo'){
      const ef=DB.get('efetivo')||[];
      csv='POSTO,RG,NOME,FUNCAO,ADIDO,ADMIN\n';
      ef.forEach(m=>{csv+=`${m.posto},${m.rg},"${m.nome}",${m.funcao},${m.adido},${m.admin}\n`;});
      nome='SPAEI_Efetivo.csv';
    } else if(tipo==='logs'){
      const logs=DB.get('logs')||[];
      csv='DATA,TIPO,DESCRICAO\n';
      logs.forEach(l=>{csv+=`"${l.dt}",${l.tipo},"${l.desc}"\n`;});
      nome='SPAEI_Logs.csv';
    }
    const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download=nome;a.click();
    URL.revokeObjectURL(a.href);
  },

    if(!rg){alert('Informe o RG / matrícula.');return;}
    if(!nome){alert('Informe o nome completo.');return;}

    const ef=DB.get('efetivo')||[];

    // Verificar RG duplicado (exceto se está editando o mesmo)
    const dup=ef.find(e=>e.rg===rg&&e.id!==id);
    if(dup){alert(`RG ${rg} já cadastrado para ${dup.nome}.`);return;}

    const novoMembro={
      id:   id||Date.now(),
      posto, rg, nome, funcao,
      adido, admin, chefe, ativo,
    };

    let novaLista;
    if(id){
      novaLista=ef.map(e=>e.id===id?novoMembro:e);
    } else {
      novaLista=[...ef, novoMembro];
    }
    DB.set('efetivo', novaLista);

    // Log
    const logs=DB.get('logs')||[];
    const u=Auth.user;
    logs.unshift({
      dt:new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}),
      tipo: id?'EDIÇÃO':'CRIAÇÃO',
      desc:`${id?'Membro editado':'Novo membro adicionado'}: ${posto} ${nome} (RG ${rg}) — Perfil: ${perfil}`
    });
    DB.set('logs',logs.slice(0,200));

    Modal.close();
    DB.set('adm_tab','efetivo');
    Render.admin();

    // Toast
    const tip=document.createElement('div');
    tip.style.cssText='position:fixed;top:70px;right:18px;background:#166534;color:#FFF;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3)';
    tip.textContent=`✅ ${id?'Membro atualizado':'Membro adicionado'}: ${nome.split(' ')[0]}`;
    document.body.appendChild(tip);
    setTimeout(()=>tip.remove(),3500);
  },

  _delMembro(id){
    const ef=DB.get('efetivo')||[];
    const m=ef.find(e=>e.id===id);
    if(!m)return;
    if(m.rg===Auth.user?.rg){alert('Você não pode remover a si mesmo.');return;}
    if(!confirm(`Remover ${m.posto} ${m.nome} (RG ${m.rg}) do sistema?\n\nO token de acesso também será revogado.`))return;
    DB.set('efetivo',ef.filter(e=>e.id!==id));
    // Revogar token
    const toks=DB.get('tokens')||{};
    delete toks[m.rg];
    DB.set('tokens',toks);
    // Log
    const logs=DB.get('logs')||[];
    logs.unshift({dt:new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}),
      tipo:'EXCLUSÃO',desc:`Membro removido: ${m.posto} ${m.nome} (RG ${m.rg})`});
    DB.set('logs',logs.slice(0,200));
    Render.admin();
  },


  async _gerarToken(rg,primeiroNome){
    const tok=randTok();
    const salt=uid().slice(0,16);
    const hash=await sha256(salt+tok);
    const toks=DB.get('tokens')||{};
    toks[rg]={hash,salt,tkPlano:tok,criado:new Date().toLocaleDateString('pt-BR'),ativo:true};
    DB.set('tokens',toks);
    const logs=DB.get('logs')||[];
    logs.unshift({dt:new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}),
      tipo:'TOKEN',desc:`Token gerado para RG ${rg} (${primeiroNome})`});
    DB.set('logs',logs.slice(0,200));
    Modal.open('🔑 Token Gerado',`
      <div style="text-align:center;padding:20px 0">
        <div style="font-size:12px;color:var(--muted);margin-bottom:8px">RG ${rg} — ${(DB.get('efetivo')||[]).find(e=>e.rg===rg)?.nome}</div>
        <div style="font-size:32px;font-family:monospace;font-weight:800;color:var(--az);letter-spacing:5px;
          background:var(--hover);padding:16px;border-radius:12px;border:2px solid var(--border);margin:10px 0">
          ${tok}</div>
        <div style="font-size:12px;color:var(--muted)">⚠️ Anote este token e entregue pessoalmente ao militar.</div>
        <div style="font-size:11px;color:#DC2626;margin-top:6px">Esta janela é a única vez que o token aparece em texto claro.</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="navigator.clipboard.writeText('${tok}').then(()=>alert('Copiado!'))">📋 Copiar</button>
        <button class="btn btn-ghost" onclick="Modal.close();Render.admin()">Fechar</button>
      </div>`);
  },

  _revogarToken(rg){
    if(!confirm(`Revogar token do RG ${rg}?`))return;
    const toks=DB.get('tokens')||{};
    delete toks[rg];
    DB.set('tokens',toks);
    Render.admin();
  },

  _resetarDados(){
    if(!confirm('⚠️ ATENÇÃO!\n\nIsso apagará TODOS os dados do sistema (efetivo, processos, avisos, tokens, logs).\n\nDeseja continuar?'))return;
    if(!confirm('Tem certeza absoluta? Esta ação não pode ser desfeita!'))return;
    DB.del('efetivo');DB.del('escala');DB.del('processos');
    DB.del('avisos');DB.del('logs');DB.del('tokens');DB.del('BOOT');
    DB.init();
    alert('Sistema resetado para os dados iniciais.');
    Render.admin();
  }
};

};

  UI.initDark();

  // Enter no login
  ['l-rg','l-tok'].forEach(id=>{
    document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')Auth.login();});

  // Restaurar sessão
  if(Auth.restore()){
    document.getElementById('login').style.display='none';

});
